services:

  backend:
    build: ./backend
    container_name: crmjuridico_backend
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    env_file:
      - ./backend/.env

  frontend:
    container_name: crmjuridico_frontend
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - backend

  db:
    image: postgres:15
    container_name: crmjuridico_postgres
    restart: always
    environment:
      POSTGRES_DB: crmjuridico
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: crmjuridico_redis
    ports:
      - "6379:6379"

  n8n:
    image: n8nio/n8n
    container_name: crmjuridico_n8n
    restart: always
    ports:
      - "5678:5678"
    depends_on:
      - backend
    env_file:
      - ./.env
    environment:
      CRM_API_BASE_URL: http://backend:3000
      CRM_INTEGRATION_API_KEY: ${CRM_INTEGRATION_API_KEY}
      CRM_OFFICE_ID: ${CRM_OFFICE_ID}
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      NODE_ENV: production
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  postgres_data:
  n8n_data: