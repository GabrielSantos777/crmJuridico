services:
  backend:
    build:
      context: ./backend
    container_name: crmjuridico_backend
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      INTEGRATION_API_KEY: ${INTEGRATION_API_KEY}
      CRM_INTEGRATION_API_KEY: ${CRM_INTEGRATION_API_KEY}
    ports:
      - "3100:3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - backend_uploads:/app/uploads
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.crm.rule=Host(`api.juriscrm.planix.space`)"
      - "traefik.http.routers.crm.entrypoints=websecure"
      - "traefik.http.routers.crm.tls.certresolver=letsencrypt"
      - "traefik.http.services.crm.loadbalancer.server.port=3000"

  db:
    image: postgres:15
    container_name: crmjuridico_postgres
    restart: unless-stopped
    env_file:
      - ./.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-crmjuridico}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: crmjuridico_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
  backend_uploads:
