services:
  backend:
    build: ./backend
    container_name: crmjuridico_backend
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      N8N_REDIS_URL: ${N8N_REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      INTEGRATION_API_KEY: ${INTEGRATION_API_KEY}
      CNJ_API_KEY: ${CNJ_API_KEY}
      TRELLO_KEY: ${TRELLO_KEY}
      TRELLO_TOKEN: ${TRELLO_TOKEN}
      TRELLO_LIST_ID: ${TRELLO_LIST_ID}
      TRELLO_BOARD_ID: ${TRELLO_BOARD_ID}
      CORS_ORIGINS: ${CORS_ORIGINS}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - app-network

  frontend:
    container_name: crmjuridico_frontend
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL}
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - app-network

  db:
    image: postgres:15
    container_name: crmjuridico_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  redis:
    image: redis:7
    container_name: crmjuridico_redis
    restart: unless-stopped
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: crmjuridico_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge