services:
  backend:
    build:
      context: ./backend
    container_name: crmjuridico_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.prod
    ports:
      - "127.0.0.1:3100:3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - backend_uploads:/app/uploads

  db:
    image: postgres:15
    container_name: crmjuridico_postgres
    restart: unless-stopped
    env_file:
      - ./backend/.env.prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-crmjuridico}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: crmjuridico_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
  backend_uploads:
